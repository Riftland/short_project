name: Rollback on dev (staging)

on:
  workflow-dispatch:

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: yarn install

      - name: Run rollback (staging)
        run: node scripts/migrate-down
        env:
          DB_URL: ${{ secrets.DB_URL }}