name: Deploy on dev (staging)

on:
  push: 
    branches: ["main"]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install dependencies
        run: yarn install

      - name: Run migrations (staging)
        run: node scripts/migrate-up
        env:
          DB_URL: ${{ secrets.DB_URL }}

      - name: Deploy on Render (staging)
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
